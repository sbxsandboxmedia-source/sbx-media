<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | SBX Media</title>
<link rel="stylesheet" href="style.css">

<style>
.thankyou-wrap{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
background:#05050d;
}

.thankyou-card{
max-width:700px;
width:100%;
background:#15152b;
border:1px solid rgba(255,255,255,.1);
border-radius:30px;
padding:60px 40px;
text-align:center;
}

.checkmark{
width:90px;
height:90px;
margin:auto;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
font-weight:900;
background:linear-gradient(135deg,#8b5cf6,#22d3ee);
margin-bottom:25px;
}

.thankyou-card h1{
font-size:52px;
margin-bottom:15px;
}

.thankyou-card p{
color:#b9bad1;
font-size:18px;
margin-bottom:15px;
}

.thankyou-buttons{
margin-top:35px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.btn{
display:inline-block;
padding:14px 24px;
border-radius:40px;
font-weight:800;
text-decoration:none;
}

.btn-primary{
background:linear-gradient(135deg,#8b5cf6,#22d3ee);
color:white;
}

.btn-outline{
border:1px solid rgba(255,255,255,.15);
color:white;
}

.small-note{
margin-top:25px;
font-size:14px;
color:#888;
}
</style>
</head>

<body>

<div class="thankyou-wrap">

<div class="thankyou-card">

<div class="checkmark">✓</div>

<h1>Thank You!</h1>

<p>Your inquiry has been submitted successfully.</p>

<p>Our team will review your requirements and contact you within <strong>24 hours.</strong></p>

<div class="thankyou-buttons">

<a href="https://wa.me/91YOURNUMBER" class="btn btn-primary">
Chat On WhatsApp
</a>

<a href="index.html" class="btn btn-outline">
Back To Home
</a>

</div>

<p class="small-note">
SBX Media • Premium Websites • SEO • Social Media Marketing
</p>

</div>

</div>

</body>
</html>
